# Alternative Gitpod configuration using pre-built Docker image
# This uses the existing Hardhat DevContainer image directly

# Use the pre-built Docker image
image: ghcr.io/utkarshbhardwaj007/polkadot-hardhat-quickstart:latest

# Workspace configuration
workspaceLocation: /workspace/DevEx-DevRel

# Tasks to run on workspace start
tasks:
  - name: Polkadot Development Setup
    init: |
      echo "🚀 Preparing Polkadot development environment..."
      # Create project directory if it doesn't exist
      mkdir -p /workspace/DevEx-DevRel
      cd /workspace/DevEx-DevRel
      
    command: |
      # Set up environment variables
      export WORKSPACE_DIR="/workspace"
      export PROJECT_DIR="/workspace/DevEx-DevRel"
      
      cd $PROJECT_DIR
      
      # Check if this is a fresh workspace
      if [ -z "$(ls -A .)" ]; then
        echo "📦 Setting up new project..."
        
        # Copy template files from the image
        if [ -d "/workspace/contracts" ]; then
          cp -r /workspace/* . 2>/dev/null || true
          cp /workspace/.gitignore . 2>/dev/null || true
        fi
        
        # Install dependencies
        if [ -f "package.json" ]; then
          npm install
        fi
      fi
      
      # Run the interactive setup for project type selection
      echo ""
      echo "🚀 Polkadot Smart Contract Development"
      echo "======================================"
      
      # Check if project already exists
      if [ -f "hardhat.config.ts" ]; then
        echo "✅ Existing Hardhat project detected"
      elif [ -f "foundry.toml" ]; then
        echo "✅ Existing Foundry project detected"
      else
        echo ""
        echo "Choose your development framework:"
        echo "1) Hardhat - JavaScript/TypeScript based"
        echo "2) Foundry - Rust/Solidity based"
        echo ""
        read -p "Enter your choice (1 or 2): " choice
        
        case $choice in
          1)
            echo "Setting up Hardhat..."
            # Hardhat is already set up from the image
            ;;
          2)
            echo "Setting up Foundry..."
            # Clean up Hardhat files
            rm -rf node_modules package*.json hardhat.config.ts contracts test ignition
            # Initialize Foundry
            forge init --no-git --force
            ;;
          *)
            echo "Using default Hardhat setup..."
            ;;
        esac
      fi
      
      # Download binaries
      mkdir -p binaries
      cd binaries
      echo "📥 Downloading Polkadot binaries..."
      wget -q -O substrate-node "http://releases.parity.io/substrate-node/polkadot-stable2555-rc5/x86_64-unknown-linux-gnu/substrate-node" || echo "Failed to download substrate-node"
      wget -q -O eth-rpc "http://releases.parity.io/eth-rpc/polkadot-stable2555-rc5/x86_64-unknown-linux-gnu/eth-rpc" || echo "Failed to download eth-rpc"
      chmod +x substrate-node eth-rpc
      cd ..
      
      # Keypair setup
      echo ""
      if [ -s ~/.address.json ]; then
        echo "✅ Paseo deployment keypair configured"
      else
        echo "⚠️  No private key found for deployment"
        read -s -p "Paseo private key (leave blank to generate new): " SECRET_INPUT
        echo ""
        
        if [ -z "$SECRET_INPUT" ]; then
          if command -v subkey &> /dev/null; then
            subkey generate --scheme ecdsa --network polkadot --output-type json > ~/.address.json
          else
            PRIVATE_KEY="0x$(openssl rand -hex 32)"
            echo "{\"secretSeed\": \"$PRIVATE_KEY\", \"ss58PublicKey\": \"Generated\"}" > ~/.address.json
          fi
        else
          if command -v subkey &> /dev/null; then
            subkey inspect --scheme ecdsa "$SECRET_INPUT" --network polkadot --output-type json > ~/.address.json
          else
            echo "{\"secretSeed\": \"$SECRET_INPUT\", \"ss58PublicKey\": \"User provided\"}" > ~/.address.json
          fi
        fi
      fi
      
      # Show keypair info
      PUBLIC_ADDRESS=$(jq -r '.ss58PublicKey' ~/.address.json 2>/dev/null || echo "N/A")
      SECRET=$(jq -r '.secretSeed' ~/.address.json 2>/dev/null || echo "N/A")
      
      if [ -f "package.json" ] && npm list ethers &>/dev/null 2>&1; then
        EVM_ADDRESS=$(node -e 'const {Wallet}=require("ethers"); console.log(new Wallet(process.argv[1]).address)' "$SECRET" 2>/dev/null || echo "N/A")
        echo "$SECRET" | npx hardhat vars set TEST_ACC_PRIVATE_KEY >/dev/null 2>&1 || true
      else
        EVM_ADDRESS="N/A"
      fi
      
      # Welcome message
      echo ""
      echo "🎉 Welcome to Polkadot Smart Contract Development!"
      echo "=================================================="
      echo ""
      echo "EVM Address: $EVM_ADDRESS"
      echo "Substrate Address: $PUBLIC_ADDRESS"
      echo ""
      echo "💰 Get test tokens at: https://faucet.polkadot.io/?parachain=1111"
      echo ""
      
      # Show commands
      if [ -f "hardhat.config.ts" ]; then
        echo "📚 Hardhat Commands:"
        echo "  npx hardhat compile"
        echo "  npx hardhat test"
        echo "  npx hardhat ignition deploy ignition/modules/MyToken.ts --network polkadotHubTestnet"
      elif [ -f "foundry.toml" ]; then
        echo "📚 Foundry Commands:"
        echo "  forge build"
        echo "  forge test"
        echo "  forge create --rpc-url <RPC_URL> --private-key <KEY> src/Counter.sol:Counter"
      fi
      echo ""
      
      # Keep terminal open
      exec bash

# VS Code extensions
vscode:
  extensions:
    - NomicFoundation.hardhat-solidity
    - esbenp.prettier-vscode
    - dbaeumer.vscode-eslint
    - rust-lang.rust-analyzer
    - tamasfe.even-better-toml

# Ports to expose
ports:
  - port: 9944
    onOpen: ignore
    visibility: private
  - port: 8545
    onOpen: ignore
    visibility: private
