# Gitpod configuration using pre-built Docker image
# This uses the existing Hardhat DevContainer image directly

# Use the pre-built Docker image  
image: ghcr.io/utkarshbhardwaj007/polkadot-hardhat-quickstart:latest

# Workspace configuration - use /workspace directly
workspaceLocation: /workspace

# Tasks to run on workspace start
tasks:
  - name: Polkadot Development Setup
    init: |
      echo "🚀 Preparing Polkadot development environment..."
      cd /workspace
      
    command: |
      # Check if devtools are available and use them
      if [ -f /usr/local/bin/devtools ] && [ -f /usr/local/bin/devtool-scripts/setup-devcontainer.sh ]; then
        echo "✅ Using devtools for setup..."
        
        # For Gitpod, we need to handle the fact that template and project are in same location
        # First, backup any existing template files if they exist
        if [ -f /workspace/package.json ] && [ ! -f /workspace/.gitpod-backup-done ]; then
          echo "📦 Backing up template files..."
          mkdir -p /tmp/template-backup
          cp -r /workspace/* /tmp/template-backup/ 2>/dev/null || true
          cp /workspace/.gitignore /tmp/template-backup/ 2>/dev/null || true
          touch /workspace/.gitpod-backup-done
        fi
        
        # Set environment variables for devtools
        export WORKSPACE_DIR="/tmp/template-backup"
        export PROJECT_DIR="/workspace"
        
        # If backup exists, use it as template source
        if [ -d /tmp/template-backup ] && [ -f /tmp/template-backup/package.json ]; then
          export WORKSPACE_DIR="/tmp/template-backup"
        fi
        
        # Run devcontainer setup
        cd /workspace
        bash /usr/local/bin/devtools setup-devcontainer
        
        # Run keypair setup
        bash /usr/local/bin/devtools setup-keypair
        
      else
        echo "⚠️ Devtools not found, manual setup required..."
        echo "Please run setup commands manually"
        exec bash
      fi

# VS Code extensions
vscode:
  extensions:
    - NomicFoundation.hardhat-solidity
    - esbenp.prettier-vscode
    - dbaeumer.vscode-eslint
    - rust-lang.rust-analyzer
    - tamasfe.even-better-toml

# Ports to expose
ports:
  - port: 9944
    onOpen: ignore
    visibility: private
  - port: 8545
    onOpen: ignore
    visibility: private
