# Gitpod configuration for Polkadot smart contract development
# This provides similar functionality to the DevContainers setup

# Use a custom Docker image that includes all necessary tools
image:
  file: .gitpod.Dockerfile

# Workspace configuration
workspaceLocation: /workspace/DevEx-DevRel

# Tasks to run on workspace start
tasks:
  - name: Polkadot Development Setup
    init: |
      # Run non-interactive setup for Gitpod
      bash /usr/local/bin/gitpod-setup
      
    command: |
      # Run keypair setup with better error handling
      bash /usr/local/bin/gitpod-setup-keypair

# VS Code extensions
vscode:
  extensions:
    - NomicFoundation.hardhat-solidity
    - esbenp.prettier-vscode
    - dbaeumer.vscode-eslint
    - rust-lang.rust-analyzer
    - tamasfe.even-better-toml

# Ports to expose
ports:
  - port: 9944
    onOpen: ignore
    visibility: private
  - port: 8545
    onOpen: ignore
    visibility: private

# GitHub prebuilds are now configured in repository settings
# See: https://www.gitpod.io/docs/prebuilds
